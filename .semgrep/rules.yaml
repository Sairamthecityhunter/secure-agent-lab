rules:
  - id: hardcoded-google-api-key
    patterns:
      - pattern-regex: '["'']AIzaSy[A-Za-z0-9_\-]+["'']'
    message: >
      SECURITY: Hardcoded Google API key detected (pattern: AIzaSy...).
      Never embed API keys directly in source code — they will be exposed in
      version control history and can be exfiltrated by anyone with repo access.
      Remediation: Remove the key from source, rotate it immediately in the
      Google Cloud Console, and load it at runtime via an environment variable
      or Secret Manager (e.g. `os.environ["GOOGLE_API_KEY"]` set outside the
      codebase, or `google.cloud.secretmanager`).
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://cloud.google.com/docs/authentication/api-keys#securing_an_api_key
        - https://semgrep.dev/docs/writing-rules/rule-syntax/
